  <text x="186" y="124" font-family="Arial, sans-serif" font-size="18" fill="#334155">Objet AB</text>
  <text x="770" y="360" font-family="Arial, sans-serif" font-size="18" fill="#334155">Image A'B'</text>
  <text x="596" y="454" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1D4ED8">Lentille convergente</text>

  <text x="122" y="174" font-family="Arial, sans-serif" font-size="18" fill="#334155">1. Rayon parallèle à l'axe</text>
  <text x="824" y="170" font-family="Arial, sans-serif" font-size="18" fill="#334155">passe par F'</text>

  <text x="160" y="398" font-family="Arial, sans-serif" font-size="18" fill="#334155">2. Rayon passant par O</text>
  <text x="160" y="426" font-family="Arial, sans-serif" font-size="18" fill="#334155">n'est pas dévié</text>

  <text x="742" y="398" font-family="Arial, sans-serif" font-size="18" fill="#334155">3. Rayon passant par F</text>
  <text x="742" y="426" font-family="Arial, sans-serif" font-size="18" fill="#334155">ressort parallèle à l'axe</text>
