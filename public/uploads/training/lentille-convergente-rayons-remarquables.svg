  <text x="690" y="236" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#B45309">F'</text>
  <text x="560" y="236" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#0F172A">O</text>

